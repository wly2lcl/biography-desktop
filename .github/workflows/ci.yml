name: Quality and Build

on:
  workflow_call:
    inputs:
      skip_desktop_build:
        description: Skip desktop packages when the caller owns the build matrix
        required: false
        type: boolean
        default: false
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  CARGO_INCREMENTAL: 0
  RUST_BACKTRACE: 1
  VITE_ENABLE_EXPERIMENTAL_PROVIDERS: 'false'

jobs:
  quality:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential curl wget file libxdo-dev libssl-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev rpm
      - run: npm ci
      - name: Release metadata policy tests
        run: bash scripts/release-metadata.test.sh
      - name: Stable and experimental build policy tests
        run: node scripts/verify-build-configs.mjs
      - name: TypeScript production build
        run: npm run build
      - name: Unit and integration tests
        run: npm test
      - name: Coverage gate
        run: npm run test:coverage
      - name: Rust formatting
        run: cargo fmt --manifest-path src-tauri/Cargo.toml --all -- --check
      - name: Rust Clippy
        run: cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets -- -D warnings
      - name: Rust tests
        run: cargo test --manifest-path src-tauri/Cargo.toml

  desktop-build:
    needs: quality
    if: ${{ inputs.skip_desktop_build != true }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-2022
            target: x86_64-pc-windows-msvc
          - os: macos-15-intel
            target: x86_64-apple-darwin
          - os: macos-15
            target: aarch64-apple-darwin
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential curl wget file libxdo-dev libssl-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev rpm
      - run: npm ci
      - name: Build stable cloud-only desktop package
        run: npm exec tauri -- build --target ${{ matrix.target }}
