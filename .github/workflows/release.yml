name: Release Build

permissions:
  contents: write

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g., 0.1.0)'
        required: false
        default: '0.1.0'

env:
  CARGO_INCREMENTAL: 0
  RUST_BACKTRACE: 1

jobs:
  prepare-release:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    outputs:
      tag: ${{ steps.create_tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Create and push tag
        id: create_tag
        run: |
          VERSION="${{ github.event.inputs.version || '0.1.0' }}"
          TAG="v${VERSION}"
          if git tag | grep -q "^${TAG}$"; then
            echo "Tag ${TAG} already exists, skipping creation"
          else
            git tag ${TAG}
            git push origin ${TAG}
            echo "Created and pushed tag ${TAG}"
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

  build-windows:
    needs: [prepare-release]
    if: always() && (needs.prepare-release.result == 'success' || github.event_name == 'push')
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc,i686-pc-windows-msvc
      - name: Install frontend dependencies
        run: npm ci
      - name: Build x64
        run: npx tauri build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Build x86
        run: npx tauri build --target i686-pc-windows-msvc
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Rename artifacts
        run: |
          dir src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe | rename-item -newname { $_.name -replace '(\d+\.\d+\.\d+)_', '${1}_windows_' }
          dir src-tauri/target/i686-pc-windows-msvc/release/bundle/nsis/*.exe | rename-item -newname { $_.name -replace '(\d+\.\d+\.\d+)_', '${1}_windows_x86_' }
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: |
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe
            src-tauri/target/i686-pc-windows-msvc/release/bundle/nsis/*.exe

  build-macos-arm64:
    needs: [prepare-release]
    if: always() && (needs.prepare-release.result == 'success' || github.event_name == 'push')
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Install frontend dependencies
        run: npm ci
      - name: Build
        run: npx tauri build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Rename artifacts
        run: |
          for f in src-tauri/target/release/bundle/dmg/*.dmg; do
            mv "$f" "$(echo "$f" | sed 's/\([0-9]\.[0-9]\.[0-9]\)_/\1_macos_arm64_/')"
          done
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-arm64-build
          path: src-tauri/target/release/bundle/dmg/*.dmg

  build-macos-x86_64:
    needs: [prepare-release]
    if: always() && (needs.prepare-release.result == 'success' || github.event_name == 'push')
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Install frontend dependencies
        run: npm ci
      - name: Build
        run: npx tauri build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Rename artifacts
        run: |
          for f in src-tauri/target/release/bundle/dmg/*.dmg; do
            mv "$f" "$(echo "$f" | sed 's/\([0-9]\.[0-9]\.[0-9]\)_/\1_macos_x86_64_/')"
          done
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-x86_64-build
          path: src-tauri/target/release/bundle/dmg/*.dmg

  build-linux:
    needs: [prepare-release]
    if: always() && (needs.prepare-release.result == 'success' || github.event_name == 'push')
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev
      - name: Install frontend dependencies
        run: npm ci
      - name: Build
        run: npx tauri build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Rename artifacts
        run: |
          for f in src-tauri/target/release/bundle/deb/*.deb; do
            mv "$f" "$(echo "$f" | sed 's/\([0-9]\.[0-9]\.[0-9]\)_/\1_linux_/')"
          done
          for f in src-tauri/target/release/bundle/rpm/*.rpm; do
            mv "$f" "$(echo "$f" | sed 's/\([0-9]\.[0-9]\.[0-9]\)-/\1-linux-/')"
          done
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/rpm/*.rpm

  release:
    needs: [prepare-release, build-windows, build-macos-arm64, build-macos-x86_64, build-linux]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - uses: actions/download-artifact@v4
      - name: Determine tag name
        id: tag
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "name=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            echo "name=v${{ github.event.inputs.version || '0.1.0' }}" >> "$GITHUB_OUTPUT"
          fi
      - name: Create Release
        uses: softprops/action-gh-release@v1
        if: ${{ needs.build-windows.result == 'success' || needs.build-macos-arm64.result == 'success' || needs.build-macos-x86_64.result == 'success' || needs.build-linux.result == 'success' }}
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          name: Release ${{ steps.tag.outputs.name }}
          draft: false
          prerelease: false
          files: |
            windows-build/**/*.exe
            macos-arm64-build/**/*.dmg
            macos-x86_64-build/**/*.dmg
            linux-build/**/*.deb
            linux-build/**/*.rpm
          generate_release_notes: true
