name: Release Build

permissions:
  contents: write

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: Version number (for example 0.2.0)
        required: true
        default: 0.1.0
      stable:
        description: Request a signed stable release
        type: boolean
        default: false

env:
  CARGO_INCREMENTAL: 0
  VITE_ENABLE_EXPERIMENTAL_PROVIDERS: 'false'

jobs:
  metadata:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.release.outputs.tag }}
      signed: ${{ steps.release.outputs.signed }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - id: release
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
          GITHUB_SHA: ${{ github.sha }}
          INPUT_VERSION: ${{ inputs.version }}
          INPUT_STABLE: ${{ inputs.stable }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
          WINDOWS_CERTIFICATE_THUMBPRINT: ${{ secrets.WINDOWS_CERTIFICATE_THUMBPRINT }}
          WINDOWS_TIMESTAMP_URL: ${{ secrets.WINDOWS_TIMESTAMP_URL }}
        run: bash scripts/release-metadata.sh

  quality:
    needs: metadata
    uses: ./.github/workflows/ci.yml
    with:
      skip_desktop_build: true

  build:
    needs: [metadata, quality]
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-2022
            target: x86_64-pc-windows-msvc
            artifact: windows-x64
          - os: macos-15-intel
            target: x86_64-apple-darwin
            artifact: macos-intel
          - os: macos-15
            target: aarch64-apple-darwin
            artifact: macos-apple-silicon
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            artifact: linux-x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential curl wget file libxdo-dev libssl-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev rpm
      - name: Import Apple signing certificate
        if: runner.os == 'macOS' && needs.metadata.outputs.signed == 'true'
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.APPLE_CERTIFICATE }}
          p12-password: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
      - name: Import Windows signing certificate
        if: runner.os == 'Windows' && needs.metadata.outputs.signed == 'true'
        shell: pwsh
        env:
          CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        run: |
          [IO.File]::WriteAllBytes('certificate.pfx', [Convert]::FromBase64String($env:CERTIFICATE))
          Import-PfxCertificate -FilePath certificate.pfx -CertStoreLocation Cert:\CurrentUser\My -Password (ConvertTo-SecureString $env:CERTIFICATE_PASSWORD -AsPlainText -Force)
      - run: npm ci
      - name: Build signed Windows package
        if: runner.os == 'Windows' && needs.metadata.outputs.signed == 'true'
        shell: pwsh
        env:
          CERTIFICATE_THUMBPRINT: ${{ secrets.WINDOWS_CERTIFICATE_THUMBPRINT }}
          TIMESTAMP_URL: ${{ secrets.WINDOWS_TIMESTAMP_URL }}
        run: |
          $config = @{ bundle = @{ windows = @{ certificateThumbprint = $env:CERTIFICATE_THUMBPRINT; digestAlgorithm = 'sha256'; timestampUrl = $env:TIMESTAMP_URL } } } | ConvertTo-Json -Depth 4 -Compress
          npm exec tauri -- build --target ${{ matrix.target }} --config $config
      - name: Build signed macOS package
        if: runner.os == 'macOS' && needs.metadata.outputs.signed == 'true'
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: npm exec tauri -- build --target ${{ matrix.target }}
      - name: Build Linux or unsigned package
        if: runner.os == 'Linux' || needs.metadata.outputs.signed != 'true'
        run: npm exec tauri -- build --target ${{ matrix.target }}
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.exe
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.dmg
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.deb
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.rpm
          if-no-files-found: error

  release:
    needs: [metadata, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.metadata.outputs.tag }}
          name: Release ${{ needs.metadata.outputs.tag }}
          target_commitish: ${{ github.sha }}
          draft: ${{ needs.metadata.outputs.signed != 'true' }}
          prerelease: ${{ needs.metadata.outputs.signed != 'true' }}
          files: artifacts/**/*
          generate_release_notes: true
